name: Visual Regression + A11y

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  visual:
    name: Visual regression
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Build
        run: bun run build

      - name: Start preview server
        run: |
          bunx vite preview --port 8080 --host 127.0.0.1 &
          echo $! > .vite.pid
          for i in {1..30}; do
            curl -sf http://127.0.0.1:8080/ >/dev/null && break
            sleep 1
          done

      - name: Run visual regression
        env:
          VR_BASE_URL: http://127.0.0.1:8080
        run: bunx tsx scripts/visual-regression.ts

      - name: Upload diffs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diffs
          path: tests/visual/
          if-no-files-found: ignore

      - name: Stop preview server
        if: always()
        run: kill "$(cat .vite.pid)" 2>/dev/null || true

  lighthouse:
    name: Lighthouse accessibility
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Start preview server
        run: |
          bunx vite preview --port 8080 --host 127.0.0.1 &
          echo $! > .vite.pid
          for i in {1..30}; do
            curl -sf http://127.0.0.1:8080/ >/dev/null && break
            sleep 1
          done
      - name: Run Lighthouse (accessibility)
        run: |
          bunx lighthouse@12 http://127.0.0.1:8080/ \
            --only-categories=accessibility \
            --output=json --output=html \
            --output-path=./lighthouse \
            --chrome-flags="--headless --no-sandbox --disable-dev-shm-usage" \
            --quiet
      - name: Enforce accessibility threshold (>=90)
        run: |
          node -e "const s=Math.round(require('./lighthouse.report.json').categories.accessibility.score*100);console.log('A11y score:',s);if(s<90)process.exit(1)"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-report
          path: |
            lighthouse.report.json
            lighthouse.report.html
      - if: always()
        run: kill "$(cat .vite.pid)" 2>/dev/null || true
